<!DOCTYPE html>
<html lang="pt-BR">
<link rel="stylesheet" href="style.css">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Cashback - Desafio Nology</title>
    
</head>
<body>

    <div class="container">
        <h1>Calculadora de Cashback</h1>
        
        <form id="cashbackForm">
            <div class="item-formulario">
                <label for="valorCompra">Valor da Compra (R$)</label>
                <input type="number" id="valorCompra" step="0.01" required placeholder="Ex: 600.00">
            </div>

            <div class="item-formulario">
                <label for="descontoCupom">Cupom de Desconto (%) - Opcional</label>
                <input type="number" id="descontoCupom" value="0" min="0" max="100">
            </div>

            <div class="item-formulario">
                <label for="tipoCliente">Tipo de Cliente</label>
                <select id="tipoCliente">
                    <option value="padrao">Padrão</option>
                    <option value="vip">VIP</option>
                </select>
            </div>

            <button type="submit">Calcular Cashback</button>
        </form>

        <div id="resultBox" class="result-box">
            Cashback Gerado: R$ <span id="valorCashback">0.00</span>
        </div>

        <hr style="margin: 30px 0; border: 1px solid #eee;">

        <h2>Seu Histórico de Consultas</h2>
        <table id="historicoTable">
            <thead>
                <tr>
                    <th>Valor da Compra</th>
                    <th>Cliente</th>
                    <th>Cashback</th>
                </tr>
            </thead>
            <tbody>
                <tr><td colspan="3">Nenhuma consulta realizada ou carregando...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        // URL da nossa futura API em Python
        const API_URL = ' http://192.168.5.5:5000';

        // Carrega o histórico assim que a página abre
        document.addEventListener('DOMContentLoaded', carregarHistorico);

        document.getElementById('cashbackForm').addEventListener('submit', async function(e) {
            e.preventDefault(); // Evita recarregar a página

            const valorCompra = parseFloat(document.getElementById('valorCompra').value);
            const descontoCupom = parseFloat(document.getElementById('descontoCupom').value) || 0;
            const eVip = document.getElementById('tipoCliente').value === 'vip';

            const payload = {
                valor_compra: valorCompra,
                e_vip: eVip,
                desconto_cupom: descontoCupom
            };

            try {
                const response = await fetch(`${API_URL}/calcular`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    const data = await response.json();
                    
                    // Exibe o resultado na tela
                    document.getElementById('valorCashback').innerText = data.cashback.toFixed(2);
                    document.getElementById('resultBox').style.display = 'block';

                    // Atualiza a tabela com o novo histórico
                    carregarHistorico();
                } else {
                    alert("Erro ao calcular o cashback na API.");
                }
            } catch (error) {
                console.error("Erro de conexão:", error);
                alert("Não foi possível conectar à API. Verifique se o backend está rodando.");
            }
        });

        async function carregarHistorico() {
            try {
                // A API vai identificar o IP automaticamente pelo request
                const response = await fetch(`${API_URL}/historico`);
                
                if (response.ok) {
                    const dados = await response.json();
                    const tbody = document.querySelector('#historicoTable tbody');
                    tbody.innerHTML = ''; // Limpa a tabela

                    if (dados.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="3">Nenhum histórico encontrado para o seu IP.</td></tr>';
                        return;
                    }

                    dados.forEach(item => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>R$ ${parseFloat(item.valor_compra).toFixed(2)}</td>
                            <td>${item.tipo_cliente}</td>
                            <td>R$ ${parseFloat(item.cashback_gerado).toFixed(2)}</td>
                        `;
                        tbody.appendChild(tr);
                    });
                }
            } catch (error) {
                console.error("Erro ao carregar histórico:", error);
            }
        }
    </script>
</body>
</html>
