<!DOCTYPE html>
<html lang="pt-BR">
<link rel="stylesheet" href="style.css">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Cashback - Desafio Nology</title>
    
</head>
<body>

    <div class="container">
        <h1>Calculadora de Cashback</h1>
        
        <form id="cashbackForm">
            <div class="item-formulario">
                <label for="valorCompra">Valor da Compra (R$)</label>
                <input type="number" id="valorCompra" step="0.01" required placeholder="Ex: 600.00">
            </div>

            <div class="item-formulario">
                <label for="descontoCupom">Cupom de Desconto (%) - Opcional</label>
                <input type="number" id="descontoCupom" value="0" min="0" max="100">
            </div>

            <div class="item-formulario">
                <label for="tipoCliente">Tipo de Cliente</label>
                <select id="tipoCliente">
                    <option value="padrao">Padrão</option>
                    <option value="vip">VIP</option>
                </select>
            </div>

            <button type="submit">Calcular Cashback</button>
        </form>

        <div id="resultBox" class="result-box">
            Cashback Gerado: R$ <span id="valorCashback">0.00</span>
        </div>

        <hr style="margin: 30px 0; border: 1px solid #eee;">

        <h2>Seu Histórico de Consultas</h2>
        <table id="historicoTable">
            <thead>
                <tr>
                    <th>Valor da Compra</th>
                    <th>Cliente</th>
                    <th>Cashback</th>
                </tr>
            </thead>
            <tbody>
                <tr><td colspan="3">Nenhuma consulta realizada ou carregando...</td></tr>
            </tbody>
        </table>
    </div>
<script src="script.js"></script>
</body>
</html>
